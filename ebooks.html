<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom right, #f9c2ff, #ffe4e1);
    margin: 0;
    padding: 0;
  }

  header {
    background-color: #ff6f91;
    padding: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  nav a {
    margin: 0 15px;
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
  }

  nav a:hover {
    color: #ffd700;
  }

  h1 {
    text-align: center;
    margin: 30px 0;
    color: #ff4d6d;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: auto;
    margin-bottom: 50px;
  }

  .cell {
    background-color: #fff;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .cell:hover {
    transform: translateY(-10px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
  }

  .cell h3 {
    margin-bottom: 10px;
    color: #ff4d6d;
  }

  .cell p {
    margin-bottom: 10px;
    font-weight: bold;
    color: #555;
  }

  .cell a {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 20px;
    background-color: #ff6f91;
    border-radius: 25px;
    color: #fff;
    text-decoration: none;
    transition: 0.3s;
  }

  .cell a:hover {
    background-color: #ff4d6d;
  }

  footer {
    background-color: #ff6f91;
    text-align: center;
    color: #fff;
    padding: 15px 0;
  }
</style>
</head>
