<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Library - Login</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom right, #f9c2ff, #ffe4e1);
    margin: 0;
    padding: 0;
  }

  header {
    background-color: #ff6f91;
    padding: 20px;
    text-align: center;
    color: white;
  }

  nav a {
    margin: 0 15px;
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
  }

  nav a:hover {
    color: #ffd700;
  }

  .form-box {
    width: 350px;
    background-color: #fff;
    margin: 100px auto;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    text-align: center;
  }

  .form-box h2 {
    color: #ff4d6d;
    margin-bottom: 20px;
  }

  .form-box input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
  }

  .form-box button {
    padding: 12px 25px;
    margin-top: 10px;
    border: none;
    background-color: #ff6f91;
    color: #fff;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  .form-box button:hover {
    background-color: #ff4d6d;
  }

  .form-box p {
    margin-top: 15px;
    font-size: 0.9rem;
  }

  .form-box p a {
    color: #ff6f91;
    text-decoration: none;
    font-weight: bold;
  }

  .form-box p a:hover {
    color: #ff4d6d;
  }

  footer {
    background-color: #ff6f91;
    color: #fff;
    text-align: center;
    padding: 15px 0;
    margin-top: 50px;
  }
</style>
</head>
<body>

<header>
  <h2>📚 MINI LIBRARY</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="ebooks.html">eBooks</a>
    <a href="about.html">About</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
  </nav>
</header>

<div class="form-box">
  <h2>Login</h2>
  <!-- HTML-only simulation of login -->
  <form action="ebooks.html">
    <input type="email" placeholder="Email" required><br>
    <input type="password" placeholder="Password" required><br>
    <button type="submit">Login</button>
  </form>
  <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>

<footer>
  &copy; 2026 Mini Library | All rights reserved
</footer>

</body>
</html>
